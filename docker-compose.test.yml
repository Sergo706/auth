services:
  mysql-test:
    image: mirror.gcr.io/library/mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: auth_tests
      MYSQL_USER: sergio
      MYSQL_PASSWORD: test
    ports:
      - "3309:3306" 
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/3306'"]
      interval: 10s
      timeout: 8s 
      retries: 5
      start_period: 7m
    tmpfs:
      - /var/lib/mysql:rw,noexec,nosuid,nodev,size=512m 
