services:
  auth:
    image: jwtauth-service:latest
    extra_hosts:
      - "host.docker.internal:host-gateway"
    pull_policy: never
    read_only: true  
    build: 
      context: ./
      dockerfile: Dockerfile
    restart: unless-stopped
    cap_drop: ["ALL"]
    user: 10001:10001
    volumes:
      - ./app-logs:/app/auth-logs:rw
      - ./detector-logs:/app/bot-detector-logs:rw
      - bot-detector-data:/app/node_modules/@riavzon/bot-detector/dist/_data-sources:rw
      - email-data:/app/dist/email-db:rw
    tmpfs:
      - /run/app:rw,noexec,nosuid,nodev,uid=10001,gid=10001,size=1m
    pids_limit: 200
    ports: 
      - "10000:10000"
    secrets:
      - age_key
      - encrypted_config
    security_opt: 
      - "no-new-privileges:true"
volumes:
  bot-detector-data:
  email-data:
secrets:
  age_key:
    file: ./age_key
  encrypted_config:
    file: ./config.json.age