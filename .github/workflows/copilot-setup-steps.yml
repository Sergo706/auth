name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths: [.github/workflows/copilot-setup-steps.yml]
  pull_request:
    paths: [.github/workflows/copilot-setup-steps.yml]

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: copilot

    services:
      mysql: 
        image: mysql:8.4   
        env:
          MYSQL_DATABASE: app_db
          MYSQL_ROOT_PASSWORD: 1234
        ports: [ "3306:3306" ] 
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -p1234"
          --health-interval=10s --health-timeout=5s --health-retries=10

      nginx:
        image: nginx:1.27-alpine
        ports: [ "8080:80" ]    

    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 20
          package-manager-cache: false

      - name: Setup SSH for private dep
        env:
          DEPLOY_KEY: ${{ secrets.BOTDETECTOR_DEPLOY_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_ed25519

      - name: Trust github.com host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client curl age 

      - name: Wait for MySQL
        run: |
          for i in {1..60}; do mysqladmin ping -h 127.0.0.1 -uroot -p1234 --silent && break; sleep 2; done
          mysql -h 127.0.0.1 -uroot -p1234 -e "CREATE DATABASE IF NOT EXISTS app_db;" 

      - name: Install dependencies
        run: npm install
      
      - name: Build
        run: npm run build

