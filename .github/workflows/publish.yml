name: Publish to NPM

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read
 
jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
        
      - name: Cache mmdbctl
        id: mmdbctl-cache 
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/mmdbctl
          key: mmdbctl-1.4.9

      - name: Install mmdbctl
        if: steps.mmdbctl-cache.outputs.cache-hit != 'true'
        run: |
          curl -Ls https://github.com/ipinfo/mmdbctl/releases/download/mmdbctl-1.4.9/deb.sh | sh
          echo "/usr/local/bin" >> $GITHUB_PATH
          which -a mmdbctl

      - name: Dependencies
        run: npm ci

      - name: Types
        run: npx tsc -p tsconfig.prod.json --noEmit
          
      - name: Publish to NPM
        run: npm publish --access public
        